<html>
    <head>
        <title>404 Page not found | Colbo Engine</title>
        
        <!-- Favicon -->
        <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
        <link rel="icon" type="image/png" href="assets/images/favicon.png">
        <link rel="icon" href="assets/images/favicon.ico">
        
        <!-- Lucide Static Icons -->
        <link rel="stylesheet" href="https://unpkg.com/lucide-static@latest/font/lucide.css" />
        
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        
        <!-- Inter & Roboto + Swap -->
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

        <meta charset="UTF-8">
        
        <script defer>
            document.querySelector("html").lang = navigator.language;
        </script>
        
        <style>
        
            html,body{
                width: 100vw;
                height: 100vh;
            }
            
            body{
                margin: 0;
                padding: 0;
                -webkit-user-select: none;
                -moz-user-select: none;
                -ms-user-select: none;
                user-select: none;
                font-family: "Inter", "Roboto", Arial, sans-serif;
            }
            
            *{
                text-shadow: 1px 1px 5px rgba(0,0,0,0.07);
            }
            
            .app{
                display: grid;
                place-items: center;
                position: relative;
                top: 3%;
                gap: 3px;
                text-align: center;
            }
            
            .fzf-icon{
                filter: drop-shadow(0 0 4px rgba(000,0,0,0.15));
            }
            
            a{
                color: #000;
                text-decoration: none;
                display: flex;
                flex-direction: row;
                gap: 10px;
                align-items: center;
                font-size: 20.3px;
                padding: 8px 17px;
                -webkit-tap-highlight-color: transparent;
                font-weight: 450;
                touch-action: manipulation;
                box-shadow: 0 0 3px rgba(0,0,0,0.15);
                border-radius: 20px;
                border: solid 1px rgba(0,0,0,0.2);
                transition: all 0.2s ease;
            }
            
            a:hover{
                background: rgba(0,0,0,0.085);
            }
            
            .header{
                border-bottom: solid 2.25px rgba(0,0,0,0.07);
                box-shadow: 0 0 4px rgba(0,0,0,0.1);
            }
            
            .foot{
                position: fixed;
                left: 0;
                bottom: 0;
                width: 100%;
                text-align: center;
                padding: 10px;
                font-size: 14.7px;
                color: rgba(0,0,0,0.85);
                border-top: solid 1px rgba(0,0,0,0.07);
            }
            
        </style>
        
    </head>
    
    <body>
        <div class="header">
            <img src="assets/images/logo.svg" width="170"/>
        </div>
        <div class="app">

            <img src="assets/images/404.png" class="fzf-icon" width="215" height="220" alt="404"/>
            <h2>404 - Page not found.</h2>
            <a href="/"><div class="icon-arrow-left"></div> Go to home</a>
        </div>
        <div class="foot">
            &copy; <span id="year"></span> Colbo Tech Enterprise&trade;
        </div>
    </body>
    
    <script defer>
        document.getElementById("year").textContent = new Date().getFullYear();
    </script>
